

services:
  cardano-node:
    container_name: cardano-node-on-${WALLET_PORT:-8090}
    image: cardanofoundation/cardano-wallet:${WALLET_TAG}
    environment:
      CARDANO_NODE_SOCKET_PATH: /ipc/${NODE_SOCKET_NAME:-node.socket}
      NETWORK: ${NETWORK:-preprod}
    volumes:
      - ${NODE_DB}:/data
      - ${NODE_SOCKET_DIR}:/ipc
      - ./configs/cardano:/configs
    restart: on-failure
    user: ${USER_ID}
    logging:
      driver: "json-file"
      options:
        compress: "true"
        max-file: "10"
        max-size: "50m"
    entrypoint: []
    command: >
      cardano-node run --topology /configs/${NETWORK}/topology.json
        --database-path /data
        --socket-path ${CARDANO_NODE_SOCKET_PATH}
        --config /configs/${NETWORK}/config.json
        +RTS -N3

  cardano-wallet:
    container_name: cardano-wallet-on-${WALLET_PORT}
    image: cardanofoundation/cardano-wallet:${WALLET_TAG}
    volumes:
      - ${WALLET_DB}:/wallet-db
      - ${NODE_SOCKET_DIR}:/ipc
      - ./configs/cardano:/configs
    ports:
      - ${WALLET_PORT}:8090
    entrypoint: []
    command: |
      NETWORK_OPTION=$([[ $$NETWORK == \"mainnet\" ]] && echo --mainnet \
        || echo --testnet /configs/${NETWORK}/byron-genesis.json)
      cardano-wallet serve \
        --node-socket ${CARDANO_NODE_SOCKET_PATH} \
        --database /wallet-db \
        --listen-address 0.0.0.0 \
        $$NETWORK_OPTION \
        +RTS -N3
    environment:
      WALLET_PORT: ${WALLET_PORT:-8090}
      CARDANO_NODE_SOCKET_PATH: /ipc/${NODE_SOCKET_NAME:-node.socket}
      NETWORK: ${NETWORK:-preprod}
    user: ${USER_ID}
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        compress: "true"
        max-file: "10"
        max-size: "50m"
  icarus:
    image: piotrstachyra/icarus:v2023-04-14
    container_name: icarus-on-${WALLET_PORT}
    network_mode: "host"
    restart: on-failure
    environment:
      WALLET_PORT: ${WALLET_PORT:-8090}
