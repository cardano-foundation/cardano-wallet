name: Release

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release

concurrency:
  group: release
  cancel-in-progress: false

env:
  RELEASE_SCRIPTS_DIR: ./scripts/release

jobs:
  prepare:
    name: "Prepare Release Candidate"
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    outputs:
      release-version: ${{ steps.rc.outputs.release-version }}
      release-candidate-commit: ${{ steps.rc.outputs.release-candidate-commit }}
      release-candidate-branch: ${{ steps.rc.outputs.release-candidate-branch }}
      release-cabal-version: ${{ steps.rc.outputs.release-cabal-version }}
      test-rc: ${{ steps.rc.outputs.test-rc }}
      node-tag: ${{ steps.rc.outputs.node-tag }}
      last-release-date: ${{ steps.rc.outputs.last-release-date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release candidate
        id: rc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: $RELEASE_SCRIPTS_DIR/release-candidate.sh

  build-artifacts:
    name: "Build ${{ matrix.name }}"
    needs: prepare
    runs-on: ${{ fromJson(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: '["self-hosted", "linux", "x86_64", "cardano-wallet"]'
            output: ci.artifacts.linux64.release
            artifact-name: linux-release
            extract: tar xzf
            binary: cardano-wallet
          - name: Windows
            runner: '["self-hosted", "linux", "x86_64", "cardano-wallet"]'
            output: ci.artifacts.win64.release
            artifact-name: windows-release
            extract: unzip -o
            binary: cardano-wallet.exe
          - name: macOS Silicon
            runner: '["self-hosted", "macOS", "ARM64", "cardano-wallet"]'
            output: packages.aarch64-darwin.ci.artifacts.macos-silicon.release
            artifact-name: macos-silicon-release
            extract: tar xzf
            binary: cardano-wallet
          - name: Docker Image
            runner: '["self-hosted", "linux", "x86_64", "cardano-wallet"]'
            output: ci.artifacts.dockerImage
            artifact-name: docker-image
            # Docker images are smoke-tested separately; skip the
            # archive-based checks below by leaving `binary` empty.
            extract: ''
            binary: ''
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release-candidate-branch }}
          fetch-depth: 0

      - name: Sanity-check checkout
        env:
          EXPECTED_COMMIT: ${{ needs.prepare.outputs.release-candidate-commit }}
          EXPECTED_CABAL_VERSION: ${{ needs.prepare.outputs.release-cabal-version }}
        run: |
          actual_commit=$(git rev-parse HEAD)
          if [ "$actual_commit" != "$EXPECTED_COMMIT" ]; then
            echo "ERROR: working tree HEAD ($actual_commit) does not match release-candidate-commit ($EXPECTED_COMMIT)"
            exit 1
          fi
          # release-cabal-version strips the leading "0." (see scripts/release/release-candidate.sh:42).
          actual_cabal_version=$(grep -m1 '^version' lib/wallet/cardano-wallet.cabal | awk '{print $2}' | sed 's/^0\.//')
          if [ "$actual_cabal_version" != "$EXPECTED_CABAL_VERSION" ]; then
            echo "ERROR: cabal version ($actual_cabal_version) does not match release-cabal-version ($EXPECTED_CABAL_VERSION)"
            exit 1
          fi
          echo "Checkout OK: $actual_commit @ $actual_cabal_version"

      - name: Build
        run: nix build --quiet -o result .#${{ matrix.output }}

      - name: Smoke test built artifact
        if: matrix.binary != ''
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.release-version }}
          EXPECTED_COMMIT: ${{ needs.prepare.outputs.release-candidate-commit }}
        run: |
          archive=$(find result/ -maxdepth 2 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | head -1)
          if [ -z "$archive" ]; then
            echo "ERROR: no archive found in result/"
            ls -laR result/
            exit 1
          fi
          archive_basename=$(basename "$archive")
          if ! echo "$archive_basename" | grep -q "$EXPECTED_VERSION"; then
            echo "ERROR: archive name '$archive_basename' does not contain expected version $EXPECTED_VERSION"
            exit 1
          fi
          # The Windows binary cannot be executed on the linux build runner
          # without wine; the verify-artifacts job covers it with wine.
          if [ "${{ matrix.name }}" = "Windows" ]; then
            echo "Archive name OK; skipping in-process version check on Windows."
            exit 0
          fi
          tmp=$(mktemp -d)
          archive_abs=$(readlink -f "$archive")
          ( cd "$tmp" && ${{ matrix.extract }} "$archive_abs" )
          binary=$(find "$tmp" -name "${{ matrix.binary }}" -type f | head -1)
          if [ -z "$binary" ]; then
            echo "ERROR: binary ${{ matrix.binary }} not found in extracted archive"
            find "$tmp" -type f
            exit 1
          fi
          version_output=$("$binary" version 2>&1)
          echo "Version output: $version_output"
          echo "Expected version: $EXPECTED_VERSION"
          echo "Expected commit:  $EXPECTED_COMMIT"
          if ! echo "$version_output" | grep -q "$EXPECTED_VERSION"; then
            echo "ERROR: binary embeds wrong version (expected $EXPECTED_VERSION)"
            exit 1
          fi
          if ! echo "$version_output" | grep -q "$EXPECTED_COMMIT"; then
            echo "ERROR: binary embeds wrong commit (expected $EXPECTED_COMMIT)"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: result

  changelog:
    name: "Generate Changelog & API Diff"
    needs: prepare
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release-candidate-branch }}
          fetch-depth: 0

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LAST_RELEASE_DATE: ${{ needs.prepare.outputs.last-release-date }}
        run: nix develop --quiet path:$RELEASE_SCRIPTS_DIR -c $RELEASE_SCRIPTS_DIR/make_changelog.sh

      - name: Generate API diff
        run: nix develop --quiet path:$RELEASE_SCRIPTS_DIR -c $RELEASE_SCRIPTS_DIR/openapi-diff.sh

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: artifacts/

  verify-artifacts:
    name: "Verify ${{ matrix.name }}"
    needs: [prepare, build-artifacts]
    runs-on: ${{ fromJson(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: '["self-hosted", "linux", "x86_64", "cardano-wallet"]'
            artifact-name: linux-release
            extract: tar xzf
            binary: cardano-wallet
          - name: Windows
            runner: '["self-hosted", "linux", "x86_64", "cardano-wallet"]'
            artifact-name: windows-release
            extract: unzip -o
            binary: cardano-wallet.exe
          - name: macOS Silicon
            runner: '["self-hosted", "macOS", "ARM64", "cardano-wallet"]'
            artifact-name: macos-silicon-release
            extract: tar xzf
            binary: cardano-wallet
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact-name }}
          path: artifact/

      - name: Extract and verify
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.release-version }}
        run: |
          cd artifact
          archive=$(find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) | head -1)
          if [ -z "$archive" ]; then
            echo "ERROR: no archive found in artifact"
            ls -laR .
            exit 1
          fi
          echo "Extracting $archive"
          mkdir -p extracted && cd extracted
          ${{ matrix.extract }} "../$archive"

          echo "Checking binary exists: ${{ matrix.binary }}"
          binary=$(find . -name "${{ matrix.binary }}" -type f | head -1)
          if [ -z "$binary" ]; then
            echo "ERROR: binary ${{ matrix.binary }} not found after extraction"
            find . -type f
            exit 1
          fi
          echo "Binary found: $binary — $(file "$binary")"

      - name: Smoke test
        if: matrix.name != 'Windows'
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.release-version }}
        run: |
          cd artifact/extracted
          binary=$(find . -name "${{ matrix.binary }}" -type f | head -1)
          version_output=$("./$binary" version 2>&1)
          echo "Version output: $version_output"
          echo "Expected: $EXPECTED_VERSION"
          if ! echo "$version_output" | grep -q "$EXPECTED_VERSION"; then
            echo "ERROR: binary does not contain expected version $EXPECTED_VERSION"
            exit 1
          fi

  e2e-linux:
    name: "E2E Linux"
    if: inputs.release_type == 'release'
    needs: [prepare, verify-artifacts]
    runs-on: [self-hosted, linux, x86_64, cardano-wallet, high-memory]
    timeout-minutes: 240
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release-candidate-branch }}
          fetch-depth: 0

      - name: Run E2E tests
        env:
          HAL_E2E_PREPROD_MNEMONICS: ${{ secrets.HAL_E2E_PREPROD_MNEMONICS }}
          TMPDIR: ${{ runner.temp }}
        run: nix shell --quiet .#cardano-node .#cardano-wallet .#e2e 'nixpkgs#gnutar' 'nixpkgs#p7zip' -c e2e

  build-e2e-windows:
    name: "Build E2E Bundle (Windows)"
    if: inputs.release_type == 'release'
    needs: prepare
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release-candidate-branch }}
          fetch-depth: 0

      - name: Cross-compile Windows E2E bundle
        run: nix build --quiet .#ci.artifacts.win64.e2e -o result

      - name: Upload E2E bundle
        uses: actions/upload-artifact@v7
        with:
          name: win-e2e
          path: result/

  e2e-windows:
    name: "E2E Windows"
    if: inputs.release_type == 'release'
    needs: [prepare, build-e2e-windows]
    runs-on: windows-2025-vs2026
    timeout-minutes: 240
    steps:
      - name: Download E2E bundle
        uses: actions/download-artifact@v8
        with:
          name: win-e2e
          path: e2e-bundle/

      - name: Run E2E tests
        working-directory: e2e-bundle
        env:
          HAL_E2E_PREPROD_MNEMONICS: ${{ secrets.HAL_E2E_PREPROD_MNEMONICS }}
        run: .\e2e.exe

  create-release:
    name: "Create ${{ inputs.release_type || 'nightly' }} Release"
    needs: [prepare, build-artifacts, verify-artifacts, changelog, e2e-linux, e2e-windows]
    if: ${{ !cancelled() && needs.prepare.result == 'success' && needs.build-artifacts.result == 'success' && needs.verify-artifacts.result == 'success' && needs.changelog.result == 'success' && (needs.e2e-linux.result == 'success' || needs.e2e-linux.result == 'skipped') && (needs.e2e-windows.result == 'success' || needs.e2e-windows.result == 'skipped') }}
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    environment: ${{ (inputs.release_type == 'release' && github.ref == 'refs/heads/master') && 'release' || '' }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.release-version }}
      RELEASE_CANDIDATE_COMMIT: ${{ needs.prepare.outputs.release-candidate-commit }}
      RELEASE_CABAL_VERSION: ${{ needs.prepare.outputs.release-cabal-version }}
      TEST_RC: ${{ needs.prepare.outputs.test-rc }}
      NODE_TAG: ${{ needs.prepare.outputs.node-tag }}
      IS_RELEASE: ${{ inputs.release_type == 'release' && 'true' || 'false' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release-candidate-branch }}
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "$IS_RELEASE" == "true" ]; then
            echo "tag=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "title=Release $RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          elif [ "$TEST_RC" == "TRUE" ]; then
            echo "tag=test" >> "$GITHUB_OUTPUT"
            echo "title=Test $RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "title=Nightly $RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -l | xargs git tag -d
          git fetch --tags
          if [ "$IS_RELEASE" == "true" ]; then
            exists=$(git tag -l "$TAG")
            if [ -n "$exists" ]; then
              echo "Tag $TAG already exists. Remove it before proceeding."
              exit 1
            fi
          else
            git tag -d "$TAG" 2>/dev/null || true
          fi
          git tag -m "$TAG" "$TAG" "$RELEASE_CANDIDATE_COMMIT"
          git push origin -f "$TAG"

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: artifacts/

      - name: Prepare release body
        shell: nix shell --quiet nixpkgs#gettext -c bash -e {0}
        run: |
          export CHANGES=$(cat artifacts/changes.md)
          export API_CHANGES=$(cat artifacts/api-diff.md)
          export DOCKER_SHA=xxx
          envsubst < "$RELEASE_SCRIPTS_DIR/release-template.md" > release-body.md

      - name: Delete existing release (nightly/test)
        if: env.IS_RELEASE == 'false'
        shell: nix shell --quiet nixpkgs#gh -c bash -e {0}
        run: gh release delete "${{ steps.tag.outputs.tag }}" --yes || true

      - name: Create GitHub release
        shell: nix shell --quiet nixpkgs#gh -c bash -e {0}
        run: |
          gh release create \
            -d \
            -F release-body.md \
            -t "${{ steps.tag.outputs.title }}" \
            "${{ steps.tag.outputs.tag }}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: build-artifacts/

      - name: Upload release artifacts
        shell: nix shell --quiet nixpkgs#gh -c bash -e {0}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cd build-artifacts

          upload() {
            local dir="$1" ext="$2" label="$3"
            [ -d "$dir" ] || return 0
            local file
            file=$(find "$dir" -type f -name "*.$ext" | head -1)
            if [ -z "$file" ]; then
              echo "ERROR: no .$ext file found in $dir" >&2
              ls -laR "$dir" >&2
              exit 1
            fi
            echo "Uploading $file as $label"
            gh release upload "$TAG" "$file#$label"
          }

          upload linux-release          tar.gz  "cardano-wallet-$TAG-linux64.tar.gz"
          upload windows-release        zip     "cardano-wallet.exe-$TAG-win64.zip"
          upload macos-silicon-release   tar.gz  "cardano-wallet-$TAG-macos-silicon.tar.gz"

          # Docker image has no extension; rename before upload so the asset
          # name (not just its display label) matches the expected pattern.
          docker_file=$(find docker-image -type f | head -1)
          if [ -n "$docker_file" ]; then
            target="cardano-wallet-$TAG-docker-image.tgz"
            cp "$docker_file" "$target"
            echo "Uploading $target"
            gh release upload "$TAG" "$target"
          fi

  verify-assets:
    name: "Verify Published Assets"
    needs: [prepare, create-release]
    # Explicit `if:` overrides the default `success()` filter, which
    # would otherwise skip this job because e2e-linux/e2e-windows are
    # skipped on nightly runs.
    if: ${{ !cancelled() && needs.create-release.result == 'success' }}
    uses: ./.github/workflows/verify-release.yml
    with:
      tag: ${{ needs.create-release.outputs.tag }}
      expected-version: ${{ needs.prepare.outputs.release-version }}
    secrets: inherit

  publish-release:
    name: "Publish Release"
    needs: [prepare, create-release, verify-assets]
    if: ${{ !cancelled() && needs.verify-assets.result == 'success' }}
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Un-draft release
        shell: nix shell --quiet nixpkgs#gh -c bash -e {0}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          echo "Publishing release $TAG"
          gh release edit "$TAG" \
            --repo cardano-foundation/cardano-wallet \
            --draft=false

  push-docker:
    name: "Push Docker Image"
    needs: [prepare, create-release, publish-release]
    if: ${{ !cancelled() && needs.publish-release.result == 'success' }}
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.release-version }}
      RELEASE_CABAL_VERSION: ${{ needs.prepare.outputs.release-cabal-version }}
      TEST_RC: ${{ needs.prepare.outputs.test-rc }}
      IS_RELEASE: ${{ inputs.release_type == 'release' && 'true' || 'false' }}
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: docker-image/

      - name: Determine tag
        id: tag
        run: |
          if [ "$IS_RELEASE" == "true" ]; then
            echo "tag=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          elif [ "$TEST_RC" == "TRUE" ]; then
            echo "tag=test" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        run: docker login -u cfhal -p "${{ secrets.DOCKER_HUB_TOKEN }}"

      - name: Load and push Docker image
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="cardanofoundation/cardano-wallet"

          image_file=$(find docker-image -type f | head -1)
          echo "Loading docker image from: $image_file ($(stat -c%s "$image_file") bytes)"
          load_output=$(docker load -i "$image_file")
          echo "$load_output"

          # Extract actual image name from docker load output
          LOADED_IMAGE=$(echo "$load_output" | grep -oP 'Loaded image: \K.*')
          echo "Loaded image: $LOADED_IMAGE"
          docker tag "$LOADED_IMAGE" "$REPO:$TAG"
          docker push "$REPO:$TAG"

          if [ "$IS_RELEASE" == "true" ]; then
            docker tag "$REPO:$TAG" "$REPO:latest"
            docker push "$REPO:latest"
          fi

  update-docs:
    name: "Update Documentation Links"
    needs: [prepare, create-release, publish-release]
    if: ${{ !cancelled() && inputs.release_type == 'release' && needs.publish-release.result == 'success' }}
    runs-on: [self-hosted, linux, x86_64, cardano-wallet]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Update redirects
        run: |
          cd releases
          ./make_redirects.sh "${{ needs.prepare.outputs.release-version }}"

      - name: Push updates
        run: git push origin gh-pages
