name: Restoration Benchmarks

on:
  schedule:
    - cron: "0 0 * * 1" # every Monday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    name: "Build benchmarks"
    runs-on: [self-hosted, linux, x86_64, cardano-wallet-bench]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build benchmark derivations
        run: nix build --quiet .#ci.benchmarks.restore

  restore:
    name: "Restore ${{ matrix.bench }}"
    needs: build
    runs-on: [self-hosted, linux, x86_64, cardano-wallet-bench]
    timeout-minutes: 870
    strategy:
      fail-fast: false
      matrix:
        include:
          - bench: base
            node-db: mainnet-1
          - bench: seq0
            node-db: mainnet-2
          - bench: seq1
            node-db: mainnet-3
          - bench: rnd5
            node-db: mainnet-4
    env:
      LC_ALL: C.UTF-8
      SETUP_TIMEOUT_SECONDS: 7200
      BENCHMARK_TIMEOUT_SECONDS: 43200
      SYNC_POLL_INTERVAL_SECONDS: 15
      SYNC_STALE_SECONDS: 1200
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run restore benchmark
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          nix shell --quiet '.#cardano-node' '.#cardano-cli' 'nixpkgs#coreutils' 'nixpkgs#gnugrep' 'nixpkgs#gawk' 'nixpkgs#jq' 'nixpkgs#time' 'nixpkgs#haskellPackages.hp2pretty' -c \
            bash scripts/ci/bench-restore.sh \
              mainnet ${{ matrix.bench }} $HOME/databases/node/${{ matrix.node-db }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: restore-${{ matrix.bench }}
          path: |
            *.txt
            *.log
            *.svg
            *.hp
            *.json
          if-no-files-found: ignore
